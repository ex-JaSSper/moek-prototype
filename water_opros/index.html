(function () {
    const COUNTER_ID = 103929872;
    const VIEW_TIME = 1000;

    function isYmReady() {
        return typeof ym === 'function';
    }

    function getText(el) {
        return (el.innerText || el.textContent || '')
            .trim()
            .replace(/\s+/g, ' ')
            .slice(0, 120);
    }

    function getSection(el) {
        const section = el.closest('[data-metrika-section]');
        return section ? section.getAttribute('data-metrika-section') : '';
    }

    function getUcParams(el) {
        if (!el || !el.classList) return [];
        return Array.from(el.classList).filter(function (className) {
            return className.indexOf('uc-') === 0;
        });
    }

    function getUxParams(el) {
        if (!el || !el.classList) return [];
        return Array.from(el.classList).filter(function (className) {
            return className.indexOf('ux-') === 0;
        });
    }

    function hasUcParams(el) {
        return getUcParams(el).length > 0;
    }

    function hasUxParams(el) {
        return getUxParams(el).length > 0;
    }

    function findUcElement(el) {
        while (el && el !== document.body) {
            if (el.classList && hasUcParams(el)) {
                return el;
            }
            el = el.parentElement;
        }
        return null;
    }

    function findUxElement(el) {
        while (el && el !== document.body) {
            if (el.classList && hasUxParams(el)) {
                return el;
            }
            el = el.parentElement;
        }
        return null;
    }

    function parseParams() {
        const params = new URLSearchParams(window.location.search);
        const result = {};

        for (const [key, value] of params.entries()) {
            if (result[key]) {
                result[key] = Array.isArray(result[key])
                    ? result[key].concat(value)
                    : [result[key], value];
            } else {
                result[key] = value;
            }
        }

        for (const key in result) {
            if (Array.isArray(result[key])) {
                result[key] = result[key].join(',');
            }
        }

        return result;
    }

    const GLOBAL_PARAMS = parseParams();

    function sendGoal(goalName, params) {
        if (!isYmReady()) return;
        ym(COUNTER_ID, 'reachGoal', goalName, params);
    }

    function sendUsClick(el) {
        if (!el) return;

        const ucParams = getUcParams(el);
        if (!ucParams.length) return;

        sendGoal('us_click_detail', {
            params: {
                uc_params: ucParams.join(','),
                event: 'click',
                id: el.id || '',
                section: getSection(el) || '',
                text: getText(el) || '',
                url: el.href || ''
            }
        });
    }

    function sendUxClick(el) {
        if (!el) return;

        const uxParams = getUxParams(el);
        if (!uxParams.length) return;

        sendGoal('us_click_detail', {
            params: {
                ux_params: uxParams.join(','),
                event: 'click',
                id: el.id || '',
                section: getSection(el) || '',
                text: getText(el) || '',
                url: el.href || ''
            }
        });
    }

    function sendUsView(el) {
        if (!el) return;

        const ucParams = getUcParams(el);
        if (!ucParams.length) return;

        sendGoal('us_view_detail', {
            params: {
                uc_params: ucParams.join(','),
                event: 'view',
                id: el.id || '',
                section: getSection(el) || '',
                text: getText(el) || '',
                url: el.href || ''
            }
        });
    }

    function sendTransportClick(el) {
        if (!el) return;

        sendGoal('transport_click', {
            event: el.dataset.metrikaClick,
            id: el.id || '',
            section: getSection(el) || '',
            text: getText(el) || '',
            url: el.href || '',
            ...GLOBAL_PARAMS
        });
    }

    function sendTransportView(el) {
        if (!el) return;

        sendGoal('transport_view', {
            event: el.dataset.metrikaView,
            id: el.id || '',
            section: getSection(el) || '',
            text: getText(el) || '',
            ...GLOBAL_PARAMS
        });
    }

    function needsUsView(el) {
        return hasUcParams(el);
    }

    function needsTransportView(el) {
        return el.hasAttribute('data-metrika-view');
    }

    function getObserverElements() {
        const result = new Set();

        document.querySelectorAll('[class*="uc-"]').forEach(function (el) {
            if (hasUcParams(el)) {
                result.add(el);
            }
        });

        document.querySelectorAll('[data-metrika-view]').forEach(function (el) {
            result.add(el);
        });

        return Array.from(result);
    }

    document.addEventListener('DOMContentLoaded', function () {
        document.addEventListener('click', function (e) {
            const ucEl = findUcElement(e.target);
            if (ucEl) {
                sendUsClick(ucEl);
            }

            const uxEl = findUxElement(e.target);
            if (uxEl) {
                sendUxClick(uxEl);
            }

            const transportEl = e.target.closest('[data-metrika-click]');
            if (transportEl) {
                sendTransportClick(transportEl);
            }
        });

        const timers = new Map();
        const sentStates = new WeakMap();

        function getState(el) {
            if (!sentStates.has(el)) {
                sentStates.set(el, {
                    usViewSent: false,
                    transportViewSent: false
                });
            }
            return sentStates.get(el);
        }

        function getTimerKey(el, type) {
            return type + '::' + (el.id || '') + '::' + Array.from(el.classList || []).join('.');
        }

        function clearElementTimer(el, type) {
            const key = getTimerKey(el, type);
            if (timers.has(key)) {
                clearTimeout(timers.get(key));
                timers.delete(key);
            }
        }

        function maybeUnobserve(el, observer) {
            const state = getState(el);
            const usDone = !needsUsView(el) || state.usViewSent;
            const transportDone = !needsTransportView(el) || state.transportViewSent;

            if (usDone && transportDone) {
                observer.unobserve(el);
            }
        }

        const observer = new IntersectionObserver(function (entries) {
            entries.forEach(function (entry) {
                const el = entry.target;
                const state = getState(el);

                if (entry.intersectionRatio >= 0.5) {
                    if (needsUsView(el) && !state.usViewSent) {
                        const usKey = getTimerKey(el, 'us_view');

                        if (!timers.has(usKey)) {
                            timers.set(usKey, setTimeout(function () {
                                sendUsView(el);
                                state.usViewSent = true;
                                timers.delete(usKey);
                                maybeUnobserve(el, observer);
                            }, VIEW_TIME));
                        }
                    }

                    if (needsTransportView(el) && !state.transportViewSent) {
                        const transportKey = getTimerKey(el, 'transport_view');

                        if (!timers.has(transportKey)) {
                            timers.set(transportKey, setTimeout(function () {
                                sendTransportView(el);
                                state.transportViewSent = true;
                                timers.delete(transportKey);
                                maybeUnobserve(el, observer);
                            }, VIEW_TIME));
                        }
                    }
                } else {
                    clearElementTimer(el, 'us_view');
                    clearElementTimer(el, 'transport_view');
                }
            });
        }, {
            threshold: [0, 0.5]
        });

        getObserverElements().forEach(function (el) {
            observer.observe(el);
        });
    });
})();

  function patchRsformEmbeds() {
    document.querySelectorAll(RSFORM_SEL).forEach(function (el) {
      var base = el.getAttribute('src') || '';

      el.setAttribute(
        'src',
        base + glue + 'page_url=' + encodeURIComponent(window.location.href)
      );
    });
  }

  document.addEventListener('DOMContentLoaded', patchRsformEmbeds);

  var root = document.getElementById('allrecords') || document.documentElement;
  if (typeof MutationObserver !== 'undefined') {
    new MutationObserver(patchRsformEmbeds).observe(root, {
      childList: true,
      subtree: true,
      attributes: true,
      attributeFilter: ['src']
    });
  }

  var n = 0;
  var t = setInterval(function () {
    patchRsformEmbeds();
    var pending = document.querySelector(RSFORM_PENDING_SEL);

})();
